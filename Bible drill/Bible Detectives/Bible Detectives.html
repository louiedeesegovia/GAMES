<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bible Detectives</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .hidden { display: none; }
        
        /* Grid container centered and sized nicely for both 4 and 10 items */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 20px; 
            max-width: 900px; 
            margin: 40px auto; 
            justify-content: center;
            justify-items: center;
        }
        
        .card { 
            cursor: pointer; 
            padding: 20px; 
            border: 1px solid #444; 
            border-radius: 10px; 
            background: #111; 
            transition: background 0.2s, transform 0.2s; 
            width: 100%;
            max-width: 160px;
            box-sizing: border-box;
        }
        .card:hover { background: #222; transform: translateY(-2px); }
        .icon { font-size: 60px; display: block; margin-bottom: 10px; }
        
        .setup-row { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; text-align: left; }
        input { width: 100%; padding: 5px; margin: 2px 0; box-sizing: border-box; }
        #case-file-view { max-width: 600px; margin: auto; text-align: left; padding: 20px; border: 1px solid #444; background: #111; }
        #answer-display { margin-top: 20px; padding: 15px; background: #222; border-left: 5px solid #0f0; }
        .nav-btn { padding: 10px 20px; font-size: 16px; margin: 10px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 5px; }
        .nav-btn:hover { background: #444; }
        .action-btn { padding: 12px 24px; font-size: 18px; cursor: pointer; background: #007bff; color: #fff; border: none; border-radius: 5px; }
        .action-btn:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div id="setup-mode">
        <h1>Game Master Setup</h1>
        <div id="setup-fields"></div>
        <button class="action-btn" onclick="startGame()" style="margin: 20px;">Start Game</button>
    </div>

    <div id="game-mode" class="hidden">
        <h1 id="game-title">Bible Detectives</h1>
        <div class="grid" id="case-grid"></div>
        <div id="game-nav-bar"></div>
    </div>

    <div id="case-file-view" class="hidden">
        <img src="man.png" width="100" style="float:left; margin-right:20px;" alt="Detective Profile">
        <div id="case-content"></div>
        
        <div id="answer-section">
            <button id="reveal-btn" class="nav-btn" onclick="revealAnswer()" style="margin-top:20px; background: #28a745;">Reveal Answer</button>
            <div id="answer-display" class="hidden"></div>
        </div>
        <hr style="border-color: #333; margin-top: 20px;">
        <button class="nav-btn" onclick="backToCases()">← Back to Cases</button>
    </div>

    <script>
        const levels = ['Easy', 'Intermediate', 'Advanced', 'Expert'];
        const fields = ['Crime', 'Charge', 'Location', 'Background', 'Details', 'Setting', 'Means', 'Physical Evidence', 'Items taken', 'Victim/s', 'Defendant', 'Circumstances', 'Method', 'Weapon', 'Clues', 'Hint'];
        let currentAnswer = "";
        let currentLevel = ""; 

        // Generate Setup Fields
        const setupDiv = document.getElementById('setup-fields');
        levels.forEach(lvl => {
            for(let i=1; i<=10; i++) {
                let html = `<div class="setup-row"><strong>${lvl} Profile ${i}</strong><br>`;
                fields.forEach(f => {
                    html += `<input type="text" id="${lvl}${i}${f}" placeholder="${f}">`;
                });
                html += `<input type="text" id="${lvl}${i}ANSWER" placeholder="THE FINAL ANSWER" style="background:#444; color:#fff; font-weight:bold;">`;
                setupDiv.innerHTML += html + `</div>`;
            }
        });

        // Transition from Setup to Main Menu
        function startGame() {
            window.gameData = {};
            levels.forEach(lvl => {
                for(let i=1; i<=10; i++) {
                    window.gameData[`${lvl}${i}`] = { details: {}, answer: "" };
                    fields.forEach(f => {
                        window.gameData[`${lvl}${i}`].details[f] = document.getElementById(`${lvl}${i}${f}`).value;
                    });
                    window.gameData[`${lvl}${i}`].answer = document.getElementById(`${lvl}${i}ANSWER`).value;
                }
            });
            document.getElementById('setup-mode').classList.add('hidden');
            document.getElementById('game-mode').classList.remove('hidden');
            showMainMenu();
        }

        // Shows the main 4 difficulty cards (Centered dynamically)
        function showMainMenu() {
            currentLevel = ""; 
            document.getElementById('game-title').innerText = "Bible Detectives";
            
            const grid = document.getElementById('case-grid');
            grid.style.maxWidth = "750px"; // Keeps the 4 main folders neatly clustered in the center
            grid.innerHTML = ''; 
            
            levels.forEach(lvl => {
                grid.innerHTML += `
                    <div class="card" onclick="playLevel('${lvl}')">
                        <span class="icon">📂</span>
                        <strong>${lvl}</strong>
                    </div>`;
            });

            const navBar = document.getElementById('game-nav-bar');
            navBar.innerHTML = `<button class="nav-btn" onclick="backToSetup()">← Back to Setup Screen</button>`;
        }

        // Shows the 10 cases inside a chosen level
        function playLevel(lvl) { 
            currentLevel = lvl;
            document.getElementById('game-title').innerText = lvl + " Cases"; 
            
            const grid = document.getElementById('case-grid'); 
            grid.style.maxWidth = "900px"; // Expands width gracefully to balance two rows of 5 cases
            grid.innerHTML = ''; 
            
            for(let i=1; i<=10; i++) {
                grid.innerHTML += `
                    <div class="card" onclick="openCase('${lvl}', ${i})">
                        <span class="icon">📄</span>
                        Profile ${i}
                    </div>`;
            }

            const navBar = document.getElementById('game-nav-bar');
            navBar.innerHTML = `<button class="nav-btn" onclick="showMainMenu()">← Back to Main Menu</button>`;
        }

        // Opens an individual case file
        function openCase(lvl, i) {
            document.getElementById('game-mode').classList.add('hidden');
            document.getElementById('case-file-view').classList.remove('hidden');
            document.getElementById('answer-display').classList.add('hidden');
            document.getElementById('reveal-btn').classList.remove('hidden');
            
            const data = window.gameData[`${lvl}${i}`];
            currentAnswer = data.answer ? data.answer : "No answer provided.";
            
            let content = `<h2>${lvl} - Profile ${i}</h2>`;
            let hasContent = false;

            for (let f in data.details) {
                if(data.details[f].trim() !== "") {
                    content += `<p><strong>${f}:</strong> ${data.details[f]}</p>`;
                    hasContent = true;
                }
            }

            if(!hasContent) {
                content += `<p style="color: #aaa; font-style: italic;">No details entered for this case.</p>`;
            }

            document.getElementById('case-content').innerHTML = content;
        }

        // Reveals answer inside a case file
        function revealAnswer() {
            const display = document.getElementById('answer-display');
            display.innerHTML = `<strong>Answer:</strong> ${currentAnswer}`;
            display.classList.remove('hidden');
            document.getElementById('reveal-btn').classList.add('hidden');
        }

        // Navigation back buttons
        function backToCases() {
            document.getElementById('case-file-view').classList.add('hidden');
            document.getElementById('game-mode').classList.remove('hidden');
            playLevel(currentLevel); 
        }

        function backToSetup() {
            document.getElementById('game-mode').classList.add('hidden');
            document.getElementById('setup-mode').classList.remove('hidden');
        }
    </script>
</body>
</html>
